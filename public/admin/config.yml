# ─────────────────────────────────────────────
# Backend: Git Gateway + Netlify Identity
# Para migrar a servidor propio, cambia a:
#   name: github
#   repo: anaanaliticamente/frama-redesign-main
#   base_url: https://tu-dominio.com
#   auth_endpoint: oauth
# ─────────────────────────────────────────────
backend:
  name: git-gateway
  branch: main

media_folder: "public/images/blog"
public_folder: "/images/blog"

locale: "es"

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  # ── Blog ──
  - name: "blog"
    label: "Blog"
    label_singular: "Articulo"
    folder: "content/blog"
    create: true
    delete: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    sortable_fields: ["date", "title"]
    summary: "{{title}} — {{date}}"
    fields:
      - { label: "Slug (URL)", name: "slug", widget: "string", hint: "URL del articulo, ej: retirada-uralita-madrid" }
      - { label: "Titulo", name: "title", widget: "string" }
      - { label: "Fecha", name: "date", widget: "string", hint: "Formato: 2 de febrero de 2022" }
      - { label: "Extracto", name: "excerpt", widget: "text", hint: "Resumen corto del articulo (1-2 frases)" }
      - label: "Categoria"
        name: "category"
        widget: "select"
        options:
          - "Amianto"
          - "Uralita"
          - "Empresa"
          - "Servicios"
          - "Informacion"
          - "Normativa"
          - "Salud"
      - { label: "Imagen destacada", name: "image", widget: "image" }
      - { label: "Tiempo de lectura", name: "readTime", widget: "string", default: "5 min" }
      - { label: "Contenido", name: "body", widget: "markdown", hint: "Usa ## para encabezados y - para listas" }

  # ── Reseñas de clientes ──
  - name: "reviews"
    label: "Reseñas"
    files:
      - name: "reviews"
        label: "Opiniones de clientes"
        file: "public/content/reviews.json"
        fields:
          - name: "reviews"
            label: "Reseñas"
            widget: "list"
            summary: "{{fields.name}} - {{fields.rating}} estrellas"
            fields:
              - { label: "Nombre", name: "name", widget: "string" }
              - { label: "Puntuacion", name: "rating", widget: "number", min: 1, max: 5, value_type: "int" }
              - { label: "Comentario", name: "text", widget: "text" }
              - { label: "Fecha", name: "date", widget: "string", hint: "Ej: Enero 2025" }

  # ── Pagina principal ──
  - name: "pages"
    label: "Paginas"
    files:
      - name: "home"
        label: "Pagina principal"
        file: "content/pages/home.json"
        fields:
          - { label: "Titulo Hero", name: "heroTitle", widget: "string" }
          - { label: "Subtitulo Hero", name: "heroSubtitle", widget: "text" }
          - { label: "Titulo Servicios", name: "servicesTitle", widget: "string" }
          - { label: "Titulo Sobre nosotros", name: "aboutTitle", widget: "string" }
          - { label: "Texto Sobre nosotros", name: "aboutText", widget: "text" }

  # ── SEO global ──
  - name: "seo"
    label: "SEO"
    files:
      - name: "global"
        label: "SEO Global"
        file: "content/seo/global.json"
        fields:
          - { label: "Titulo del sitio", name: "siteTitle", widget: "string" }
          - { label: "Descripcion", name: "siteDescription", widget: "text" }
          - { label: "Palabras clave", name: "keywords", widget: "string" }

  # ── Configuracion del sitio ──
  - name: "settings"
    label: "Configuracion"
    files:
      - name: "general"
        label: "Datos generales"
        file: "public/content/settings.json"
        fields:
          - { label: "Titulo del sitio", name: "siteTitle", widget: "string" }
          - { label: "Descripcion SEO", name: "siteDescription", widget: "text" }
          - { label: "Telefono", name: "phone", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "WhatsApp (solo numeros)", name: "whatsapp", widget: "string" }
          - { label: "Horario", name: "schedule", widget: "string" }
          - { label: "Numero RERA", name: "rera", widget: "string" }
          - { label: "Numero NIMA", name: "nima", widget: "string" }
          - { label: "Seguro RC", name: "insurance", widget: "string" }
