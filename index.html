<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FRAMA - Retirada de Amianto | Empresa Autorizada RERA</title>
    <meta name="description" content="FRAMA - Empresa autorizada para la retirada segura y certificada de amianto. Servicio integral en Madrid, Toledo, Avila, Guadalajara, Segovia y Cuenca.">
    <meta name="author" content="FRAMA" />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="FRAMA - Retirada de Amianto | Empresa Autorizada RERA">
    <meta property="og:description" content="Empresa autorizada para la retirada segura y certificada de amianto. Presupuesto gratuito.">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="FRAMA - Retirada de Amianto">
    <meta name="twitter:description" content="Empresa autorizada para la retirada segura y certificada de amianto.">

    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">

    <!-- Prevent theme flash -->
    <script>
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <!-- Netlify Identity para CMS -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
